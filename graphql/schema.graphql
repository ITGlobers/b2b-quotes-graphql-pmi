type Query {
  getAppSettings: AppSettings
    @auditAccess
    @cacheControl(scope: PRIVATE, maxAge: SHORT)
    @auth(scope: PUBLIC)
  getQuoteEnabledForUser(email: String!): Boolean
    @auditAccess
    @cacheControl(scope: PRIVATE, maxAge: SHORT)
    @auth(scope: PUBLIC)
  getQuote(id: String): Quote
    @validateStoreUserAccess
    @withPermissions
    @withSession
    @withSegment
    @cacheControl(scope: PRIVATE, maxAge: SHORT)
    @auth(scope: PUBLIC)
  getQuotes(
    organization: [String]
    costCenter: [String]
    status: [String]
    search: String
    page: Int = 1
    pageSize: Int = 25
    sortOrder: String = "DESC"
    sortedBy: String = "lastUpdate"
  ): Quotes
    @validateStoreUserAccess
    @withPermissions
    @withSession
    @withSegment
    @cacheControl(scope: PRIVATE, maxAge: SHORT)
    @auth(scope: PUBLIC)
  getChildrenQuotes(
    id: String
    sortOrder: String = "DESC"
    sortedBy: String = "lastUpdate"
  ): [Quote]
    @validateStoreUserAccess
    @withPermissions
    @withSession
    @withSegment
    @cacheControl(scope: PRIVATE, maxAge: SHORT)
    @auth(scope: PUBLIC)
  checkSellerQuotes(sellers: [String!]!): [Seller!]!
    @validateStoreUserAccess
    @withPermissions
    @withSession
    @withSegment
    @cacheControl(scope: PRIVATE, maxAge: SHORT)
    @auth(scope: PUBLIC)
  generateQuoteSuggestion(input: GenerateQuoteSuggestionInput): QuoteSuggestion!
    @validateStoreUserAccess
    @withPermissions
    @withSession
    @withSegment
    @cacheControl(scope: PRIVATE, maxAge: SHORT)
    @auth(scope: PUBLIC)
}

type Mutation {
  createQuote(input: QuoteInput!): String
    @validateStoreUserAccess
    @withPermissions
    @withSession
    @withSegment
    @auth(scope: PUBLIC)
  updateQuote(input: QuoteUpdateInput!): String
    @validateStoreUserAccess
    @withPermissions
    @withSession
    @auth(scope: PUBLIC)
  useQuote(id: String, orderFormId: String): String
    @validateStoreUserAccess
    @withPermissions
    @withSession
    @auth(scope: PUBLIC)
  clearCart(orderFormId: String): String 
    @validateStoreUserAccess
    @auth(scope: PUBLIC)
  saveAppSettings(input: AppSettingsInput!): AppSettings
    @validateAdminUserAccess
    @cacheControl(scope: PRIVATE)
    @auth(scope: PUBLIC)
}
